name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  CLUSTER_NAME: ecommerce-eks
  TF_STATE_BUCKET_PREFIX: ecommerce-tf-state
  TF_LOCK_TABLE: ecommerce-terraform-locks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve backend names
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="${TF_STATE_BUCKET_PREFIX}-${ACCOUNT_ID}-${AWS_REGION}"
          echo "bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "key=terraform/${CLUSTER_NAME}.tfstate" >> "$GITHUB_OUTPUT"

      - name: Ensure Terraform state bucket exists
        env:
          BUCKET_NAME: ${{ steps.backend.outputs.bucket }}
        run: |
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            aws s3api create-bucket               --bucket "$BUCKET_NAME"               --region "$AWS_REGION"               --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi
          aws s3api put-bucket-versioning             --bucket "$BUCKET_NAME"             --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption             --bucket "$BUCKET_NAME"             --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Ensure Terraform lock table exists
        run: |
          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws dynamodb create-table               --table-name "$TF_LOCK_TABLE"               --attribute-definitions AttributeName=LockID,AttributeType=S               --key-schema AttributeName=LockID,KeyType=HASH               --billing-mode PAY_PER_REQUEST               --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init             -backend-config="bucket=${{ steps.backend.outputs.bucket }}"             -backend-config="key=${{ steps.backend.outputs.key }}"             -backend-config="region=${{ env.AWS_REGION }}"             -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"             -backend-config="encrypt=true"

      - name: Import existing AWS resources into Terraform state
        run: |
          if aws iam get-role --role-name "${CLUSTER_NAME}-cluster-role" >/dev/null 2>&1; then
            terraform -chdir=terraform import aws_iam_role.eks_cluster "${CLUSTER_NAME}-cluster-role" || true
          fi
          if aws iam get-role --role-name "${CLUSTER_NAME}-nodes-role" >/dev/null 2>&1; then
            terraform -chdir=terraform import aws_iam_role.eks_nodes "${CLUSTER_NAME}-nodes-role" || true
          fi
          if aws ecr describe-repositories --repository-names ecommerce --region "${AWS_REGION}" >/dev/null 2>&1; then
            terraform -chdir=terraform import aws_ecr_repository.app ecommerce || true
          fi

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve

      - name: Fetch Terraform outputs
        id: tf
        run: |
          echo "repository=$(terraform -chdir=terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "cluster=$(terraform -chdir=terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPOSITORY: ${{ steps.tf.outputs.repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REPOSITORY:latest" .
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY:latest"

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name "${{ steps.tf.outputs.cluster }}" --region "${{ env.AWS_REGION }}"

      - name: Deploy to Kubernetes
        env:
          IMAGE_URI: ${{ steps.tf.outputs.repository }}:${{ github.sha }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          sed "s|IMAGE_URI|$IMAGE_URI|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/ecommerce -n webapps --timeout=180s
